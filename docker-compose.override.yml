services:
  database:
    container_name: autoescuela_db
    ports:
      - "3306:3306"

  backend:
    container_name: autoescuela_backend
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: database
      DB_PORT: 3306
      DB_SYNC: "true"
      DB_SYNC_ALTER: "true"
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src
      - ./escuela_de_conductores:/app/escuela_de_conductores
      - ./uploads:/app/uploads

  frontend:
    container_name: autoescuela_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      WATCHPACK_POLLING: "true"
      WDS_SOCKET_PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    stdin_open: true
